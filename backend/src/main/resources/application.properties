spring.application.name=footwear-backend

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/shivam-footwear;AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Enable H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Shop defaults (editable in Settings page)
shop.name=Shivam Footwear Shop
shop.address=Your Shop Address Here
shop.phone=+91 XXXXXXXXXX
shop.gstin=
shop.pin=1234
