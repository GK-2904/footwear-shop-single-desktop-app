# Desktop / portable offline profile — activated via: --spring.profiles.active=desktop
spring.datasource.url=jdbc:h2:file:./data/shivam-footwear;AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Shop defaults (override in data/shop.properties if needed)
shop.name=Shivam Footwear Shop
shop.address=Your Shop Address Here
shop.phone=+91 XXXXXXXXXX
shop.gstin=
shop.pin=1234
