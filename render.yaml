services:
  # Backend Spring Boot API
  - type: web
    name: footwear-api
    runtime: docker
    repo: https://github.com/yourusername/FootWearProject # TODO: Replace with your repository URL
    branch: main
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: footwear-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: footwear-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: footwear-db
          property: password

  # Frontend React App (Static Site)
  - type: web
    name: footwear-frontend
    runtime: static
    repo: https://github.com/yourusername/FootWearProject # TODO: Replace with your repository URL
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: footwear-api
          property: url

databases:
  # Managed PostgreSQL Database
  - name: footwear-db
    databaseName: footwear_shop
    user: postgres
